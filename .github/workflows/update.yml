name: Update listings

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # ручной запуск кнопкой в GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Режим A: Telethon (TG_API_ID + TG_SESSION_B64 заданы в Secrets) ──────
      # Берёт rent_phangan (~8к рус), adsphangan, phangan_rent, arenda_phangan
      # + koh_phangan_rent для полноты. Даёт на порядок больше объявлений.
      #
      # Как подключить один раз:
      #   1. Создай API: https://my.telegram.org → My Applications
      #   2. Залогинься на Mac: TG_API_ID=... TG_API_HASH=... python3 ingest/telegram_bulk_fetch.py
      #   3. Закодируй сессию: base64 -i sabaistay_bulk.session | tr -d '\n'
      #   4. GitHub → Settings → Secrets:
      #        TG_API_ID      = 1234567
      #        TG_API_HASH    = abcdef...
      #        TG_SESSION_B64 = <base64 из шага 3>
      # ─────────────────────────────────────────────────────────────────────────
      - name: Scrape Telegram
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
        run: |
          if [ -n "$TG_API_ID" ] && [ -n "$TG_SESSION_B64" ]; then
            echo "📡 Режим A: Telethon (расширенный сбор — rent_phangan и др.)"
            pip install telethon -q
            echo "$TG_SESSION_B64" | base64 -d > sabaistay_bulk.session
            TG_SESSION=sabaistay_bulk \
              python3 ingest/telegram_bulk_fetch.py --limit 200 -o /tmp/tg_raw.json
            rm -f sabaistay_bulk.session
          else
            echo "📡 Режим B: web-preview (только koh_phangan_rent, без аккаунта)"
            python3 ingest/telegram_preview.py koh_phangan_rent --pages 15 -o /tmp/tg_raw.json
          fi
          echo "Scraped: $(python3 -c 'import json; print(len(json.load(open("/tmp/tg_raw.json"))), "posts")')"

      - name: Parse listings
        run: |
          python3 parser/parse_lite.py /tmp/tg_raw.json \
            --merge data/sample_listings.json \
            -o data/sample_listings.json

      - name: Build site
        run: python3 web/build.py

      - name: Commit & push if changed
        run: |
          git config user.name "sabaistay-bot"
          git config user.email "bot@sabaistay.co"
          git add data/sample_listings.json web/index.html
          if git diff --staged --quiet; then
            echo "Нет новых объявлений — пропускаем коммит"
          else
            COUNT=$(python3 -c "
          import json, sys
          data = json.load(open('data/sample_listings.json'))
          listings = [p for p in data.get('listings', []) if p.get('parsed', {}).get('is_listing')]
          print(len(listings))
          ")
            git commit -m "chore: update listings — ${COUNT} объявлений ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push origin main
          fi
